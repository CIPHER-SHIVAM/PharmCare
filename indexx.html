<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PharmaCare · Pharmacy Management</title>

    <!-- Tailwind + Google Fonts + Icons -->
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300;14..32,400;14..32,500;14..32,600;14..32,700;14..32,800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

    <!-- React + ReactDOM -->
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js">
    </script>
    <script crossorigin src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js">
    </script>

    <style>
        * {
            font-family: 'Inter', sans-serif;
        }
        body {
            background: #f4f7fc;
            min-height: 100vh;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.3);
        }
        .sidebar-glass {
            background: rgba(10, 30, 60, 0.88);
            backdrop-filter: blur(16px);
            border-right: 1px solid rgba(255, 255, 255, 0.06);
        }
        .stat-card {
            transition: transform 0.2s ease, box-shadow 0.3s ease;
        }
        .stat-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 20px 40px -12px rgba(0, 20, 50, 0.2);
        }
        .nav-link {
            transition: all 0.2s ease;
            border-radius: 12px;
        }
        .nav-link:hover {
            background: rgba(255, 255, 255, 0.08);
            transform: translateX(4px);
        }
        .nav-link.active {
            background: rgba(255, 255, 255, 0.12);
            box-shadow: inset 4px 0 0 #60a5fa;
        }
        .table-row:hover {
            background: #f8fafc;
        }
        .modal-overlay {
            animation: fadeIn 0.2s ease;
        }
        .modal-content {
            animation: slideUp 0.3s ease;
        }
        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }
        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px) scale(0.96);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
        @keyframes floatIcon1 {
            0%,
            100% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 0.2;
            }
            25% {
                transform: translate(20px, -30px) rotate(10deg) scale(1.1);
                opacity: 0.35;
            }
            50% {
                transform: translate(-15px, -50px) rotate(-5deg) scale(0.9);
                opacity: 0.25;
            }
            75% {
                transform: translate(25px, -20px) rotate(15deg) scale(1.05);
                opacity: 0.3;
            }
        }
        @keyframes floatIcon2 {
            0%,
            100% {
                transform: translate(0, 0) rotate(0deg) scale(1);
                opacity: 0.15;
            }
            33% {
                transform: translate(-25px, -40px) rotate(-12deg) scale(1.15);
                opacity: 0.3;
            }
            66% {
                transform: translate(20px, -25px) rotate(8deg) scale(0.85);
                opacity: 0.2;
            }
        }
        @keyframes floatIcon3 {
            0%,
            100% {
                transform: translate(0, 0) scale(1);
                opacity: 0.1;
            }
            50% {
                transform: translate(0, -60px) scale(1.2);
                opacity: 0.25;
            }
        }
        @keyframes floatCard {
            0%,
            100% {
                transform: translateY(0px);
            }
            50% {
                transform: translateY(-8px);
            }
        }
        @keyframes pulseRing {
            0% {
                box-shadow: 0 0 0 0 rgba(96, 165, 250, 0.4);
            }
            70% {
                box-shadow: 0 0 0 20px rgba(96, 165, 250, 0);
            }
            100% {
                box-shadow: 0 0 0 0 rgba(96, 165, 250, 0);
            }
        }
        @keyframes marquee {
            0% {
                transform: translateX(100%);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateX(-100%);
                opacity: 0;
            }
        }
        .float-card {
            animation: floatCard 4s ease-in-out infinite;
        }
        .pulse-ring {
            animation: pulseRing 2s ease-out infinite;
        }
        .marquee-container {
            overflow: hidden;
            white-space: nowrap;
            position: relative;
        }
        .marquee-text {
            display: inline-block;
            animation: marquee 12s linear infinite;
        }
        .copyright-text {
            color: rgba(255, 255, 255, 0.75);
            text-shadow: 0 0 20px rgba(96, 165, 250, 0.3);
        }
        .copyright-text:hover {
            color: rgba(255, 255, 255, 0.95);
            text-shadow: 0 0 30px rgba(96, 165, 250, 0.6);
        }
        .login-bg {
            background: linear-gradient(135deg, #0a1628 0%, #1a2a4a 40%, #0d1f3c 70%, #0a1628 100%);
        }
        input:focus,
        select:focus {
            outline: none;
            border-color: #60a5fa;
            box-shadow: 0 0 0 3px rgba(96, 165, 250, 0.2);
        }
        .stock-value-card {
            background: linear-gradient(135deg, rgba(16, 185, 129, 0.1), rgba(5, 150, 105, 0.2));
            border: 1px solid rgba(16, 185, 129, 0.2);
        }
        .stock-value-card .value {
            background: linear-gradient(135deg, #059669, #10b981);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .floating-icon {
            position: absolute;
            pointer-events: none;
            opacity: 0.15;
            font-size: 2.5rem;
        }
        .floating-icon:nth-child(odd) {
            animation: floatIcon1 8s ease-in-out infinite;
        }
        .floating-icon:nth-child(3n) {
            animation: floatIcon2 10s ease-in-out infinite;
        }
        .floating-icon:nth-child(5n+2) {
            animation: floatIcon3 7s ease-in-out infinite;
        }
        .glow-dot {
            position: absolute;
            border-radius: 50%;
            pointer-events: none;
            background: radial-gradient(circle, rgba(96, 165, 250, 0.08), transparent 70%);
        }
        .login-left-panel {
            background: linear-gradient(135deg, rgba(96, 165, 250, 0.15), rgba(139, 92, 246, 0.15));
            backdrop-filter: blur(4px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }
        @media print {
            .no-print {
                display: none !important;
            }
            .print-receipt {
                background: white !important;
                box-shadow: none !important;
                border: none !important;
            }
            body {
                background: white !important;
            }
        }
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #eef2f7;
            border-radius: 8px;
        }
        ::-webkit-scrollbar-thumb {
            background: #b0c4de;
            border-radius: 8px;
        }
    </style>
</head>
<body>

    <div id="root">
        <div class="flex items-center justify-center min-h-screen text-gray-500">
            <div class="text-center">
                <i class="fas fa-spinner fa-spin text-3xl text-blue-500 mb-4"></i>
                <p>Loading PharmaCare...</p>
            </div>
        </div>
    </div>

    <script>
        (function() {
            if (typeof React === 'undefined' || typeof ReactDOM === 'undefined') {
                document.getElementById('root').innerHTML = `
                    <div class="flex items-center justify-center min-h-screen text-red-600 p-6">
                        <div class="bg-white/80 backdrop-blur rounded-2xl p-8 max-w-lg shadow-xl">
                            <h2 class="text-xl font-bold mb-2">React failed to load</h2>
                            <p class="text-sm text-gray-600">Check your internet connection and reload.</p>
                        </div>
                    </div>
                `;
                return;
            }

            const { useState, useEffect, useMemo, createContext, useContext } = React;

            // ─── Constants ────────────────────────────────────────────────
            const STORAGE_KEY = 'pharmaCare_data';
            const AUTH_KEY = 'pharmaCare_auth';

            const defaultMedicines = [{
                id: 'med1',
                name: 'Paracetamol 500mg',
                company: 'Cipla',
                type: 'Tablet',
                quantity: 100,
                price: 50,
                expiryDate: '2026-12-31'
            }, {
                id: 'med2',
                name: 'Amoxicillin 250mg',
                company: 'GSK',
                type: 'Capsule',
                quantity: 50,
                price: 120,
                expiryDate: '2026-08-15'
            }, {
                id: 'med3',
                name: 'Cetirizine 10mg',
                company: 'Sun Pharma',
                type: 'Tablet',
                quantity: 200,
                price: 30,
                expiryDate: '2027-01-10'
            }, {
                id: 'med4',
                name: 'Ibuprofen 400mg',
                company: 'Dr. Reddy\'s',
                type: 'Tablet',
                quantity: 75,
                price: 80,
                expiryDate: '2026-07-20'
            }, {
                id: 'med5',
                name: 'Azithromycin 500mg',
                company: 'Zydus',
                type: 'Tablet',
                quantity: 40,
                price: 250,
                expiryDate: '2026-09-05'
            }, {
                id: 'med6',
                name: 'Metformin 500mg',
                company: 'USV',
                type: 'Tablet',
                quantity: 150,
                price: 60,
                expiryDate: '2026-11-01'
            }, {
                id: 'med7',
                name: 'Amlodipine 5mg',
                company: 'Torrent',
                type: 'Tablet',
                quantity: 90,
                price: 45,
                expiryDate: '2026-10-15'
            }, {
                id: 'med8',
                name: 'Omeprazole 20mg',
                company: 'AstraZeneca',
                type: 'Capsule',
                quantity: 60,
                price: 70,
                expiryDate: '2027-02-20'
            }, {
                id: 'med9',
                name: 'Losartan 50mg',
                company: 'Novartis',
                type: 'Tablet',
                quantity: 80,
                price: 55,
                expiryDate: '2026-12-01'
            }, {
                id: 'med10',
                name: 'Atorvastatin 10mg',
                company: 'Pfizer',
                type: 'Tablet',
                quantity: 45,
                price: 95,
                expiryDate: '2026-08-30'
            }, {
                id: 'med11',
                name: 'Salbutamol Inhaler',
                company: 'Cipla',
                type: 'Liquid',
                quantity: 30,
                price: 280,
                expiryDate: '2026-06-25'
            }, {
                id: 'med12',
                name: 'Ciprofloxacin 500mg',
                company: 'Bayer',
                type: 'Tablet',
                quantity: 35,
                price: 110,
                expiryDate: '2026-07-10'
            }, {
                id: 'med13',
                name: 'Fluconazole 150mg',
                company: 'Pfizer',
                type: 'Capsule',
                quantity: 25,
                price: 180,
                expiryDate: '2026-06-20'
            }, {
                id: 'med14',
                name: 'Paracetamol Syrup 120ml',
                company: 'Cipla',
                type: 'Liquid',
                quantity: 60,
                price: 90,
                expiryDate: '2026-09-12'
            }, {
                id: 'med15',
                name: 'Cetrimide Cream',
                company: 'GSK',
                type: 'Cream',
                quantity: 40,
                price: 150,
                expiryDate: '2026-05-30'
            }];

            function loadData() {
                try {
                    const raw = localStorage.getItem(STORAGE_KEY);
                    if (raw) {
                        const parsed = JSON.parse(raw);
                        if (parsed && Array.isArray(parsed.medicines) && parsed.medicines.length > 0) {
                            return parsed;
                        }
                    }
                } catch (_) {}
                return { medicines: defaultMedicines, orders: [] };
            }

            function saveData(data) {
                localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
            }

            function loadAuth() {
                return { user: null, role: null };
            }

            function saveAuth(auth) {
                localStorage.setItem(AUTH_KEY, JSON.stringify(auth));
            }

            function generateId() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

            function formatDate(iso) {
                if (!iso) return '—';
                const d = new Date(iso + 'T00:00:00');
                return d.toLocaleDateString('en-GB', { day: '2-digit', month: 'short', year: 'numeric' });
            }

            function isExpired(iso) {
                return new Date(iso + 'T00:00:00') < new Date();
            }

            function daysUntil(iso) {
                const now = new Date();
                now.setHours(0, 0, 0, 0);
                const exp = new Date(iso + 'T00:00:00');
                return Math.ceil((exp - now) / (1000 * 60 * 60 * 24));
            }

            function isLowStock(qty, threshold = 10) { return qty <= threshold; }

            function currency(n) { return '₹' + Number(n).toLocaleString('en-IN'); }

            // ─── Context ──────────────────────────────────────────────────
            const AppContext = createContext(null);

            function AppProvider({ children }) {
                const [data, setData] = useState(() => loadData());
                const [auth, setAuth] = useState(() => loadAuth());
                const [darkMode, setDarkMode] = useState(false);
                const [currentPage, setCurrentPage] = useState('dashboard');
                const [notification, setNotification] = useState(null);

                useEffect(() => {
                    saveData(data);
                }, [data]);

                useEffect(() => {
                    saveAuth(auth);
                }, [auth]);

                useEffect(() => {
                    const medicines = data.medicines || [];
                    const lowStock = medicines.filter(m => isLowStock(m.quantity));
                    const expired = medicines.filter(m => isExpired(m.expiryDate));
                    const expiringSoon = medicines.filter(m => {
                        const d = daysUntil(m.expiryDate);
                        return d > 0 && d <= 7;
                    });

                    let msg = '';
                    if (lowStock.length > 0) msg += `${lowStock.length} low stock items. `;
                    if (expired.length > 0) msg += `${expired.length} expired items. `;
                    if (expiringSoon.length > 0) msg += `${expiringSoon.length} items expiring within 7 days.`;

                    if (msg) {
                        setNotification({ message: msg, type: 'warning' });
                        const timer = setTimeout(() => setNotification(null), 8000);
                        return () => clearTimeout(timer);
                    } else {
                        setNotification(null);
                    }
                }, [data.medicines]);

                const addMedicine = (med) => {
                    const newMed = { ...med, id: generateId() };
                    setData(prev => ({
                        ...prev,
                        medicines: [...prev.medicines, newMed],
                    }));
                    return newMed;
                };

                const updateMedicine = (id, updates) => {
                    setData(prev => ({
                        ...prev,
                        medicines: prev.medicines.map(m => m.id === id ? { ...m, ...updates } : m)
                    }));
                };

                const deleteMedicine = (id) => {
                    if (!window.confirm('Delete this medicine permanently?')) return;
                    setData(prev => ({
                        ...prev,
                        medicines: prev.medicines.filter(m => m.id !== id)
                    }));
                };

                const addOrder = (items) => {
                    const total = items.reduce((sum, it) => sum + it.price * it.quantity, 0);
                    const order = {
                        id: generateId(),
                        items: items.map(it => ({ ...it })),
                        total,
                        date: new Date().toISOString(),
                        status: 'completed'
                    };
                    setData(prev => {
                        const newMedicines = prev.medicines.map(m => {
                            const found = items.find(it => it.medicineId === m.id);
                            if (found) {
                                return { ...m, quantity: Math.max(0, m.quantity - found.quantity) };
                            }
                            return m;
                        });
                        return {
                            ...prev,
                            medicines: newMedicines,
                            orders: [...prev.orders, order]
                        };
                    });
                    return order;
                };

                const deleteOrder = (id) => {
                    if (!window.confirm('Delete this order?')) return;
                    setData(prev => ({
                        ...prev,
                        orders: prev.orders.filter(o => o.id !== id)
                    }));
                };

                const login = (username, password, role) => {
                    if (role === 'admin' && username === 'admin' && password === 'admin123') {
                        setAuth({ user: username, role: 'admin' });
                        return true;
                    } else if (role === 'staff' && username === 'staff' && password === 'staff123') {
                        setAuth({ user: username, role: 'staff' });
                        return true;
                    }
                    return false;
                };

                const logout = () => {
                    setAuth({ user: null, role: null });
                    setCurrentPage('dashboard');
                };

                const totalStockValue = useMemo(() => {
                    return (data.medicines || []).reduce((sum, m) => sum + (m.quantity * m.price), 0);
                }, [data.medicines]);

                const value = {
                    data,
                    setData,
                    auth,
                    login,
                    logout,
                    darkMode,
                    setDarkMode,
                    currentPage,
                    setCurrentPage,
                    addMedicine,
                    updateMedicine,
                    deleteMedicine,
                    addOrder,
                    deleteOrder,
                    isAdmin: auth.role === 'admin',
                    isStaff: auth.role === 'staff',
                    isAuthenticated: !!auth.user,
                    userRole: auth.role || null,
                    userName: auth.user || null,
                    totalStockValue,
                    notification,
                };

                return React.createElement(AppContext.Provider, { value }, children);
            }

            function useApp() {
                const ctx = useContext(AppContext);
                if (!ctx) throw new Error('useApp must be used within AppProvider');
                return ctx;
            }

            const Icon = ({ name, className = '' }) => {
                return React.createElement('i', { className: `fas fa-${name} ${className}` });
            };

            // ─── Login Page ──────────────────────────────────────────────
            function LoginPage() {
                const { login } = useApp();
                const [username, setUsername] = useState('');
                const [password, setPassword] = useState('');
                const [role, setRole] = useState('staff');
                const [error, setError] = useState('');

                const handleSubmit = (e) => {
                    e.preventDefault();
                    setError('');
                    if (!username.trim() || !password.trim()) {
                        setError('Please fill in all fields.');
                        return;
                    }
                    const success = login(username, password, role);
                    if (!success) {
                        setError('Invalid credentials. Please try again.');
                    }
                };

                const currentYear = new Date().getFullYear();

                // Medical icons for background
                const medicalIcons = [
                    'capsules', 'pills', 'syringe', 'heartbeat', 'band-aid',
                    'tablets', 'vial', 'prescription-bottle', 'x-ray', 'clinic-medical',
                    'stethoscope', 'ambulance', 'bone', 'brain', 'tooth',
                    'dna', 'hospital', 'microscope', 'heart', 'lungs',
                    'eye', 'ear', 'teeth', 'joint', 'flask',
                    'droplet', 'thermometer', 'weight-scale', 'heart-pulse',
                    'crutch', 'wheelchair', 'medical', 'user-md', 'user-nurse',
                    'blender-phone', 'briefcase-medical', 'clock', 'calendar-check'
                ];

                return React.createElement('div', { className: 'login-bg min-h-screen flex items-center justify-center p-4 relative overflow-hidden' },
                    // Background glow dots
                    React.createElement('div', { className: 'absolute inset-0 overflow-hidden pointer-events-none' },
                        Array.from({ length: 15 }, (_, i) => {
                            const size = 60 + Math.random() * 180;
                            const style = {
                                width: size + 'px',
                                height: size + 'px',
                                top: (i * 7 + 2) % 100 + '%',
                                left: (i * 11 + 5) % 100 + '%',
                                background: `radial-gradient(circle, rgba(${96 + i * 10}, ${165 + i * 5}, ${250 - i * 8}, ${0.04 + i * 0.005}), transparent 70%)`,
                            };
                            return React.createElement('div', { key: i, className: 'glow-dot', style: style });
                        })
                    ),
                    // Floating icons background
                    React.createElement('div', { className: 'absolute inset-0 overflow-hidden pointer-events-none' },
                        medicalIcons.map((name, i) => {
                            const style = {
                                top: 3 + (i * 5 + 7) % 92 + '%',
                                left: 2 + (i * 9 + 11) % 96 + '%',
                                animationDelay: (i * 0.6 + 1) % 6 + 's',
                                animationDuration: (7 + (i % 5)) + 's',
                                fontSize: (2 + (i % 4) * 0.5) + 'rem',
                                color: ['#60a5fa', '#34d399', '#a78bfa', '#f472b6', '#fbbf24', '#f87171', '#38bdf8', '#e879f9'][
                                    i % 8
                                ],
                                opacity: 0.12 + (i % 5) * 0.03,
                            };
                            return React.createElement(Icon, {
                                key: i,
                                name: name,
                                className: 'floating-icon',
                                style: style
                            });
                        })
                    ),
                    // Main login card with split layout
                    React.createElement('div', { className: 'glass-card rounded-3xl w-full max-w-4xl shadow-2xl border-0 relative z-10 float-card overflow-hidden flex flex-col md:flex-row' },
                        // Left Panel - Logo & Branding
                        React.createElement('div', { className: 'login-left-panel w-full md:w-2/5 p-8 flex flex-col items-center justify-center text-white relative overflow-hidden' },
                            // Inner floating icons (subtle)
                            React.createElement('div', { className: 'absolute inset-0 overflow-hidden pointer-events-none' },
                                ['capsules', 'pills', 'syringe', 'heartbeat', 'stethoscope'].map((name, i) => {
                                    const style = {
                                        top: (i * 20 + 10) % 90 + '%',
                                        left: (i * 25 + 5) % 90 + '%',
                                        fontSize: (1.5 + i * 0.5) + 'rem',
                                        opacity: 0.15,
                                        color: 'white',
                                        animationDelay: (i * 0.5) + 's',
                                        animationDuration: (6 + i) + 's',
                                    };
                                    return React.createElement(Icon, {
                                        key: i,
                                        name: name,
                                        className: 'floating-icon',
                                        style: style
                                    });
                                })
                            ),
                            // Main Logo
                            React.createElement('div', { className: 'relative z-10 text-center' },
                                React.createElement('div', { className: 'w-28 h-28 rounded-3xl bg-gradient-to-br from-blue-400 via-indigo-500 to-purple-600 flex items-center justify-center text-white text-6xl mx-auto shadow-2xl shadow-blue-500/30 pulse-ring' },
                                    React.createElement(Icon, { name: 'heartbeat' })
                                ),
                                React.createElement('h2', { className: 'text-3xl font-bold mt-6 tracking-tight text-white drop-shadow-lg' }, 'PharmaCare'),
                                React.createElement('p', { className: 'text-sm text-white/70 mt-2 max-w-xs mx-auto' },
                                    'Smart Pharmacy Management System'
                                ),
                                React.createElement('div', { className: 'mt-6 flex justify-center gap-2 text-white/40 text-xs' },
                                    React.createElement('span', { className: 'w-1.5 h-1.5 rounded-full bg-white/50' }),
                                    React.createElement('span', { className: 'w-1.5 h-1.5 rounded-full bg-white/30' }),
                                    React.createElement('span', { className: 'w-1.5 h-1.5 rounded-full bg-white/20' })
                                )
                            )
                        ),
                        // Right Panel - Form
                        React.createElement('div', { className: 'w-full md:w-3/5 p-8 md:p-10' },
                            React.createElement('div', { className: 'mb-6' },
                                React.createElement('h3', { className: 'text-2xl font-bold text-gray-800' }, 'Welcome Back'),
                                React.createElement('p', { className: 'text-sm text-gray-500 mt-1' }, 'Sign in to your account')

            // ─── Main App ─────────────────────────────────────────────────
            function App() {
                const { currentPage, darkMode, isAuthenticated } = useApp();

                useEffect(() => {
                    if (darkMode) document.documentElement.classList.add('dark');
                    else document.documentElement.classList.remove('dark');
                }, [darkMode]);

                if (!isAuthenticated) {
                    return React.createElement(LoginPage, null);
                }

                const pageMap = {

                    medicines: React.createElement(Medicines, null),
                    orders: React.createElement(Orders, null),

                return React.createElement('div', { className: `min-h-screen flex ${darkMode ? 'dark bg-gray-900' : 'bg-[#f4f7fc]'}` },
                    React.createElement(Sidebar, null),
